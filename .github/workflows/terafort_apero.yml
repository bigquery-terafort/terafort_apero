# =============================================================================
# Terafort <- Apero Partner Report -> BigQuery     (PHASE 2.1: HARDENED)
# Path MUST be: .github/workflows/terafort_apero.yml
#
# v2.1 CHANGES (2026-07-11) — chain-death proofing after the GH_PAT incident:
#   🛡️ 1. PRE-FLIGHT CANARY: GH_PAT is TESTED (dummy secret write) BEFORE the
#         refresh token is consumed. Dead PAT => run fails EARLY, chain stays
#         ALIVE and unconsumed => fix = regenerate PAT only, NO re-seed needed.
#         (Old order consumed the token first; a dead PAT then lost it.)
#   🛡️ 2. SECOND DAILY CRON (19:30 PKT): max gap between runs drops from 24h
#         to ~12h vs the token's 24h lifetime — schedule-delay-proof.
#   (concurrency guard + persist-before-pull already existed and stay.)
#
# Required repo secrets: GCP_SA_KEY, BQ_PROJECT, APERO_REFRESH_TOKEN, GH_PAT
#   GH_PAT: fine-grained, THIS repo only, "Secrets" = Read and write,
#           expiry 1 YEAR + calendar reminder at 11 months.
# =============================================================================
name: terafort_apero_to_bigquery

on:
  schedule:
    - cron: "30 2 * * *"        # 02:30 UTC = 07:30 PKT daily
    - cron: "30 14 * * *"       # 14:30 UTC = 19:30 PKT daily  (v2.1 safety run)
  workflow_dispatch:
    inputs:
      apero_bearer_token:
        description: "OPTIONAL fresh Apero JWT (leave empty to use refresh-token rotation)"
        required: false
        default: ""
        type: string
      lookback_days:
        description: "Days to pull (rolling window)"
        required: false
        default: "30"
        type: string

permissions:
  contents: read

concurrency:
  group: apero-pull             # never two runs at once -> rotation + MERGE stay safe
  cancel-in-progress: false

jobs:
  pull-and-load:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask manual token (if provided)
        if: ${{ inputs.apero_bearer_token != '' }}
        run: |
          echo "::add-mask::${{ inputs.apero_bearer_token }}"
          echo "APERO_BEARER_TOKEN=${{ inputs.apero_bearer_token }}" >> "$GITHUB_ENV"

      # ----- 🛡️ v2.1 PRE-FLIGHT: verify GH_PAT BEFORE consuming the chain ----
      - name: Pre-flight - GH_PAT can write secrets?
        if: ${{ inputs.apero_bearer_token == '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set APERO_PAT_CANARY --repo "${{ github.repository }}" --body "ok-$(date +%s)" \
            || { echo "🚨 GH_PAT dead/expired — refresh token is STILL SAFE (unconsumed)."; \
                 echo "   Fix: regenerate the fine-grained PAT (Secrets: Read-write, this repo)"; \
                 echo "   and update the GH_PAT secret. NO token re-seed needed."; exit 1; }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----- TOKEN ROTATION (scheduled runs / manual without token) ---------
      - name: Refresh Apero token
        id: refresh
        if: ${{ inputs.apero_bearer_token == '' }}
        env:
          APERO_REFRESH_TOKEN: ${{ secrets.APERO_REFRESH_TOKEN }}
        run: python terafort_apero_refresh.py

      - name: Persist rotated refresh token (BEFORE data pull -- chain safety)
        if: ${{ inputs.apero_bearer_token == '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_REFRESH: ${{ steps.refresh.outputs.new_refresh_token }}
        run: |
          if [ -z "$NEW_REFRESH" ]; then
            echo "🚨 refresh step produced no new token -- aborting before chain damage"
            exit 1
          fi
          gh secret set APERO_REFRESH_TOKEN --repo "${{ github.repository }}" --body "$NEW_REFRESH"
          echo "✅ APERO_REFRESH_TOKEN secret rotated"

      # ----- DATA PULL -------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run Apero -> BigQuery pipeline
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: apero
          BQ_TABLE: apero_daily
          SKIP_GCS: "1"
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '30' }}
        run: python terafort_apero.py   # APERO_BEARER_TOKEN already in env

      - name: Verify load (row counts per day)
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import bigquery
          bq = bigquery.Client(project=os.environ["BQ_PROJECT"])
          q = f"""
            SELECT report_date, COUNT(*) apps,
                   ROUND(SUM(revenue_usd),2) revenue,
                   ROUND(SUM(net_profit_usd),2) net_profit
            FROM `{os.environ["BQ_PROJECT"]}.apero.apero_daily`
            GROUP BY report_date ORDER BY report_date DESC LIMIT 35"""
          for r in bq.query(q).result():
              print(f"{r.report_date}  apps={r.apps:<3} revenue={r.revenue:>12,.2f} "
                    f"net_profit={r.net_profit:>12,.2f}")
          EOF

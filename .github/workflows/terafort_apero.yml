# =============================================================================
# Terafort <- Apero Partner Report -> BigQuery        (PHASE 2: full automation)
# Path MUST be: .github/workflows/terafort_apero.yml   (plural "workflows"!)
#
# Modes:
#   * SCHEDULED (daily 07:30 PKT) -- refresh-token rotation, zero hands
#   * MANUAL with token input     -- paste a fresh JWT, skips rotation
#   * MANUAL without token input  -- uses rotation, same as scheduled
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   GCP_SA_KEY            service account JSON (BigQuery Data Editor + Job User)
#   BQ_PROJECT            GCP project id
#   APERO_REFRESH_TOKEN   refresh_token cookie value (seed once; auto-rotates)
#   GH_PAT                fine-grained PAT, THIS repo only, permission:
#                         "Secrets" = Read and write  (used to persist the
#                         rotated refresh token after every run)
#
# ROTATION CHAIN RULE: every successful refresh invalidates the previous
# refresh token. The workflow therefore persists the new token IMMEDIATELY
# after refresh, BEFORE pulling data. If runs stop for >24h the chain dies --
# re-seed APERO_REFRESH_TOKEN from DevTools (Application -> Cookies).
# =============================================================================
name: terafort_apero_to_bigquery

on:
  schedule:
    - cron: "30 2 * * *"        # 02:30 UTC = 07:30 PKT daily
  workflow_dispatch:
    inputs:
      apero_bearer_token:
        description: "OPTIONAL fresh Apero JWT (leave empty to use refresh-token rotation)"
        required: false
        default: ""
        type: string
      lookback_days:
        description: "Days to pull (rolling window)"
        required: false
        default: "30"
        type: string

permissions:
  contents: read

concurrency:
  group: apero-pull             # never two runs at once -> rotation + MERGE stay safe
  cancel-in-progress: false

jobs:
  pull-and-load:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mask manual token (if provided)
        if: ${{ inputs.apero_bearer_token != '' }}
        run: |
          echo "::add-mask::${{ inputs.apero_bearer_token }}"
          echo "APERO_BEARER_TOKEN=${{ inputs.apero_bearer_token }}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----- TOKEN ROTATION (scheduled runs / manual without token) ---------
      - name: Refresh Apero token
        id: refresh
        if: ${{ inputs.apero_bearer_token == '' }}
        env:
          APERO_REFRESH_TOKEN: ${{ secrets.APERO_REFRESH_TOKEN }}
        run: python terafort_apero_refresh.py

      - name: Persist rotated refresh token (BEFORE data pull -- chain safety)
        if: ${{ inputs.apero_bearer_token == '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_REFRESH: ${{ steps.refresh.outputs.new_refresh_token }}
        run: |
          if [ -z "$NEW_REFRESH" ]; then
            echo "🚨 refresh step produced no new token -- aborting before chain damage"
            exit 1
          fi
          gh secret set APERO_REFRESH_TOKEN --repo "${{ github.repository }}" --body "$NEW_REFRESH"
          echo "✅ APERO_REFRESH_TOKEN secret rotated"

      # ----- DATA PULL -------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run Apero -> BigQuery pipeline
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: apero
          BQ_TABLE: apero_daily
          SKIP_GCS: "1"                 # direct-to-BQ; flip to "0" + GCS_BUCKET
                                        # to re-enable the raw landing zone
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '30' }}
        run: python terafort_apero.py   # APERO_BEARER_TOKEN already in env

      - name: Verify load (row counts per day)
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import bigquery
          bq = bigquery.Client(project=os.environ["BQ_PROJECT"])
          q = f"""
            SELECT report_date, COUNT(*) apps,
                   ROUND(SUM(revenue_usd),2) revenue,
                   ROUND(SUM(net_profit_usd),2) net_profit
            FROM `{os.environ["BQ_PROJECT"]}.apero.apero_daily`
            GROUP BY report_date ORDER BY report_date DESC LIMIT 35"""
          for r in bq.query(q).result():
              print(f"{r.report_date}  apps={r.apps:<3} revenue={r.revenue:>12,.2f} "
                    f"net_profit={r.net_profit:>12,.2f}")
          EOF
